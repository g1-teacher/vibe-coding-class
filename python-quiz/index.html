<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파이썬 선택문 퀴즈</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🐍 파이썬 퀴즈 탐험대 🚀</h1>
            <p>선택문(if, elif, else) 정복하기!</p>
        </header>

        <main>
            <!-- Quiz Screen -->
            <section id="quiz-screen" class="active-screen">
                <div class="progress-container">
                    <div class="progress-info">
                        <div class="progress-text">문제 <span id="current-q">1</span> / <span id="total-q">5</span></div>
                        <div class="timer-text">⏳ <span id="time-left">30</span>초</div>
                    </div>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>

                <div class="question-card">
                    <h2 id="question-text">질문이 여기에 표시됩니다.</h2>
                    <div id="code-block" class="code-block hidden">
                        <pre><code id="code-text"></code></pre>
                    </div>
                    <div class="hint-container">
                        <button id="btn-hint" class="btn-hint">💡 힌트 보기 (정답 시 점수 절반)</button>
                        <div id="hint-text" class="hint-text hidden"></div>
                    </div>
                </div>

                <div class="options-grid" id="options-container">
                    <!-- Options will be generated by JS -->
                </div>

                <div id="feedback-area" class="feedback-area hidden">
                    <div id="feedback-text" class="feedback-text"></div>
                    <button id="btn-next" class="btn-primary">다음 문제 ➡️</button>
                </div>
            </section>

            <!-- Results Screen -->
            <section id="result-screen" class="hidden-screen">
                <div class="result-card">
                    <h2>🎉 퀴즈 완료! 🎉</h2>
                    <div class="score-display">
                        <span id="score-text">0</span>점
                    </div>
                    <p id="result-message" class="result-message">참 잘했어요!</p>
                    <button id="btn-restart" class="btn-primary btn-large">🔄 다시 풀기</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Confetti for success -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
