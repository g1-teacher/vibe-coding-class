<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재미있는 분수 놀이</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🍕 재미있는 분수 놀이 🍰</h1>
            <p>분수를 시각적으로 배우고 퀴즈를 풀어보아요!</p>
            <div class="mode-switch">
                <button id="btn-explore" class="active">탐구 모드</button>
                <button id="btn-quiz">퀴즈 모드</button>
            </div>
        </header>

        <main>
            <!-- Explore Mode -->
            <section id="explore-section" class="active-section">
                <div class="card">
                    <h2>분수 만들어보기</h2>
                    <div class="visual-container">
                        <svg id="explore-pie" viewBox="-1 -1 2 2" style="transform: rotate(-90deg)"></svg>
                    </div>
                    <div class="input-area">
                        <div class="fraction-input">
                            <div class="input-group">
                                <label for="explore-numerator">분자 (색칠된 조각)</label>
                                <input type="number" id="explore-numerator" min="0" max="12" value="1">
                            </div>
                            <div class="fraction-line"></div>
                            <div class="input-group">
                                <label for="explore-denominator">분모 (전체 조각)</label>
                                <input type="number" id="explore-denominator" min="1" max="12" value="4">
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Quiz Mode -->
            <section id="quiz-section">
                <div class="card">
                    <h2>이 분수는 무엇일까요?</h2>
                    <div class="visual-container">
                        <svg id="quiz-pie" viewBox="-1 -1 2 2" style="transform: rotate(-90deg)"></svg>
                    </div>
                    <div class="input-area">
                        <div class="fraction-input quiz-input-area">
                            <input type="number" id="quiz-numerator" min="0" placeholder="?">
                            <div class="fraction-line"></div>
                            <input type="number" id="quiz-denominator" min="1" placeholder="?">
                        </div>
                    </div>
                    <div class="action-area">
                        <button id="btn-check" class="primary-btn">정답 확인</button>
                        <button id="btn-next" class="secondary-btn hidden">다음 문제</button>
                    </div>
                    <div id="feedback-message" class="feedback"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Confetti for success -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
